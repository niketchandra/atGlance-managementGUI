services:
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8002:8002"
      - "8001:8001"
    volumes:
      - ./kong:/kong/declarative
    depends_on:
      - api
